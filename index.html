<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Дашборд с неоморфным дизайном</title>
</head>

<body class="light-theme">
    <!-- SVG спрайт (скрыт) -->
    <svg style="display: none;">
        <!-- Иконки переключения темы -->
        <symbol id="icon-sun" viewBox="0 0 24 24">
            <path
                d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
                stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        </symbol>
        <symbol id="icon-moon" viewBox="0 0 24 24">
            <path
                d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
                stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        </symbol>
        <!-- Иконки для переключателя -->
        <symbol id="icon-check" viewBox="0 0 16 16">
            <path
                d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z" />
        </symbol>
        <symbol id="icon-x" viewBox="0 0 16 16">
            <path
                d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z" />
        </symbol>
        <!-- Иконка освещения/лампы -->
        <symbol id="icon-light" viewBox="0 0 16 16">
            <path
                d="M2 6a6 6 0 1 1 10.174 4.31c-.203.196-.359.4-.453.619l-.762 1.769A.5.5 0 0 1 10.5 13a.5.5 0 0 1 0 1 .5.5 0 0 1 0 1l-.224.447a1 1 0 0 1-.894.553H6.618a1 1 0 0 1-.894-.553L5.5 15a.5.5 0 0 1 0-1 .5.5 0 0 1 0-1 .5.5 0 0 1-.46-.302l-.761-1.77a2 2 0 0 0-.453-.618A5.98 5.98 0 0 1 2 6m6-5a5 5 0 0 0-3.479 8.592c.263.254.514.564.676.941L5.83 12h4.342l.632-1.467c.162-.377.413-.687.676-.941A5 5 0 0 0 8 1" />
        </symbol>
        <!-- Иконка телевизора -->
        <symbol id="icon-tv" viewBox="0 0 16 16">
            <path
                d="M2.5 13.5A.5.5 0 0 1 3 13h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5M2 2h12s2 0 2 2v6s0 2-2 2H2s-2 0-2-2V4s0-2 2-2" />
            <path d="M1 4h14v6H1z" />
        </symbol>
        <!-- Иконка замка -->
        <symbol id="icon-lock" viewBox="0 0 16 16">
            <path
                d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2" />
        </symbol>
        <!-- Иконка термостата -->
        <symbol id="icon-thermostat" viewBox="0 0 16 16">
            <path
                d="M8 0a1 1 0 0 1 1 1v5.268A4 4 0 0 1 12 10v3a4 4 0 1 1-8 0v-3a4 4 0 0 1 3-3.732V1a1 1 0 0 1 1-1m0 9a3 3 0 0 0-3 3v3a3 3 0 1 0 6 0v-3a3 3 0 0 0-3-3" />
        </symbol>
        <!-- Иконка камеры -->
        <symbol id="icon-camera" viewBox="0 0 16 16">
            <path
                d="M15 12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h1.172a3 3 0 0 0 2.12-.879l.83-.828A1 1 0 0 1 6.827 3h2.344a1 1 0 0 1 .707.293l.828.828A3 3 0 0 0 12.828 5H14a1 1 0 0 1 1 1zM2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4z" />
            <path
                d="M8 11a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5m0 1a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7M3 6.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0" />
        </symbol>
    </svg>

    <div class="header">
        <div class="header-content">
            <div class="time" id="time">--:--</div>
            <div class="today">
                <div id="date">-- --- ----</div>
                <div id="weekday">----------</div>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <svg class="theme-icon">
                    <use href="#icon-sun" />
                </svg>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="content">
            <div class="block">
                <div class="block-title">Кнопки</div>
                <div class="block-buttons">
                    <div class="button-item">
                        <input type="checkbox" id="scenario1" class="button-checkbox">
                        <label for="scenario1" class="button-label">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-door-open" viewBox="0 0 16 16">
                                <path d="M8.5 10c-.276 0-.5-.448-.5-1s.224-1 .5-1 .5.448.5 1-.224 1-.5 1" />
                                <path
                                    d="M10.828.122A.5.5 0 0 1 11 .5V1h.5A1.5 1.5 0 0 1 13 2.5V15h1.5a.5.5 0 0 1 0 1h-13a.5.5 0 0 1 0-1H3V1.5a.5.5 0 0 1 .43-.495l7-1a.5.5 0 0 1 .398.117M11.5 2H11v13h1V2.5a.5.5 0 0 0-.5-.5M4 1.934V15h6V1.077z" />
                            </svg>
                            Кнопка 1
                        </label>
                    </div>
                    <div class="button-item">
                        <input type="checkbox" id="scenario2" class="button-checkbox">
                        <label for="scenario2" class="button-label">Кнопка 2</label>
                    </div>
                    <div class="button-item">
                        <input type="checkbox" id="scenario3" class="button-checkbox">
                        <label for="scenario3" class="button-label">Кнопка 3</label>
                    </div>
                </div>
            </div>

            <!-- Карточка с основными показателями -->
            <div class="card">
                <div class="card-title">Основное</div>
                <div class="indicators">
                    <div class="indicator">
                        <div class="indicator-title">название</div>
                        <div class="indicator-value">25.7<span class="indicator-unit">C</span></div>
                    </div>
                    <div class="indicator">
                        <div class="indicator-title">название</div>
                        <div class="indicator-value">25.7<span class="indicator-unit">C</span></div>
                    </div>
                    <div class="indicator">
                        <div class="indicator-title">название</div>
                        <div class="indicator-value">25.7<span class="indicator-unit">C</span></div>
                    </div>
                    <div class="indicator">
                        <div class="indicator-title">название</div>
                        <div class="indicator-value">25.7<span class="indicator-unit">C</span></div>
                    </div>
                </div>
            </div>

            <!-- Управление приборами/оборудованием -->
            <div class="block">
                <div class="block-title">Устройства</div>
                <div class="block-devices">
                    <div class="device" id="device1">
                        <div class="device-header">
                            <div class="device-icon">
                                <svg width="100%" height="100%" fill="currentColor" viewBox="0 0 16 16">
                                    <use href="#icon-light" />
                                </svg>
                            </div>
                            <div class="device-since">2 мин назад</div>
                        </div>
                        <div class="device-title">Свет</div>
                        <div class="device-info">Гостиная</div>
                        <div class="device-footer">
                            <div class="switch" id="deviceSwitch1" role="switch" aria-checked="false" tabindex="0">
                                <span class="icon-off">
                                    <svg fill="currentColor" viewBox="0 0 16 16">
                                        <use href="#icon-x" />
                                    </svg>
                                </span>
                                <span class="icon-on">
                                    <svg fill="currentColor" viewBox="0 0 16 16">
                                        <use href="#icon-check" />
                                    </svg>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="device" id="device2">
                        <div class="device-header">
                            <div class="device-icon">
                                <svg width="100%" height="100%" fill="currentColor" viewBox="0 0 16 16">
                                    <use href="#icon-tv" />
                                </svg>
                            </div>
                            <div class="device-since">5 мин назад</div>
                        </div>
                        <div class="device-title">Телевизор</div>
                        <div class="device-info">Спальня</div>
                        <div class="device-footer">
                            <div class="switch" id="deviceSwitch2" role="switch" aria-checked="false" tabindex="0">
                                <span class="icon-off">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <use href="#icon-x" />
                                    </svg>
                                </span>
                                <span class="icon-on">
                                    <svg fill="currentColor" viewBox="0 0 16 16">
                                        <use href="#icon-check" />
                                    </svg>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="device" id="device3">
                        <div class="device-header">
                            <div class="device-icon">
                                <svg width="100%" height="100%" fill="currentColor" viewBox="0 0 16 16">
                                    <use href="#icon-lock" />
                                </svg>
                            </div>
                            <div class="device-since">10 мин назад</div>
                        </div>
                        <div class="device-title">Замок</div>
                        <div class="device-info">Входная дверь</div>
                        <div class="device-footer">
                            <div class="switch" id="deviceSwitch3" role="switch" aria-checked="false" tabindex="0">
                                <span class="icon-off">
                                    <svg fill="currentColor" viewBox="0 0 16 16">
                                        <use href="#icon-x" />
                                    </svg>
                                </span>
                                <span class="icon-on">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <use href="#icon-check" />
                                    </svg>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="device" id="device4">
                        <div class="device-header">
                            <div class="device-icon">
                                <svg width="100%" height="100%" fill="currentColor" viewBox="0 0 16 16">
                                    <use href="#icon-thermostat" />
                                </svg>
                            </div>
                            <div class="device-since">15 мин назад</div>
                        </div>
                        <div class="device-title">Термостат</div>
                        <div class="device-info">Коридор</div>
                        <div class="device-footer">
                            <div class="switch" id="deviceSwitch4" role="switch" aria-checked="false" tabindex="0">
                                <span class="icon-off">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <use href="#icon-x" />
                                    </svg>
                                </span>
                                <span class="icon-on">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <use href="#icon-check" />
                                    </svg>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="device" id="device5">
                        <div class="device-header">
                            <div class="device-icon">
                                <svg width="100%" height="100%" fill="currentColor" viewBox="0 0 16 16">
                                    <use href="#icon-camera" />
                                </svg>
                            </div>
                            <div class="device-since">20 мин назад</div>
                        </div>
                        <div class="device-title">Камера</div>
                        <div class="device-info">Фасад</div>
                        <div class="device-footer">
                            <div class="switch" id="deviceSwitch5" role="switch" aria-checked="false" tabindex="0">
                                <span class="icon-off">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <use href="#icon-x" />
                                    </svg>
                                </span>
                                <span class="icon-on">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                        <use href="#icon-check" />
                                    </svg>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Карточка с камерой и переключателем -->
            <div class="card camera">
                <div class="card-title">Камера</div>
                <div class="switch" id="cameraSwitch" role="switch" aria-checked="false" tabindex="0">
                    <span class="icon-off">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <use href="#icon-x" />
                        </svg>
                    </span>
                    <span class="icon-on">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <use href="#icon-check" />
                        </svg>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
