<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Дашборд с неоморфным дизайном</title>
</head>

<body class="light-theme">
    <!-- SVG спрайт (скрыт) -->
    <svg style="display: none;">
        <symbol id="icon-sun" viewBox="0 0 24 24">
            <path
                d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
                stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        </symbol>
        <symbol id="icon-moon" viewBox="0 0 24 24">
            <path
                d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
                stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        </symbol>
    </svg>

    <div class="container">
        <div class="header">
            <div class="time" id="time">--:--</div>
            <div class="today">
                <div id="date">-- --- ----</div>
                <div id="weekday">----------</div>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <svg class="theme-icon">
                    <use href="#icon-sun" />
                </svg>
            </div>
        </div>

        <div class="content">
            <div class="block">
                <div class="block-title">Кнопки</div>
                <div class="block-buttons">
                    <div class="button-item">
                        <input type="checkbox" id="scenario1" class="button-checkbox">
                        <label for="scenario1" class="button-label">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-door-open" viewBox="0 0 16 16">
                                <path d="M8.5 10c-.276 0-.5-.448-.5-1s.224-1 .5-1 .5.448.5 1-.224 1-.5 1" />
                                <path
                                    d="M10.828.122A.5.5 0 0 1 11 .5V1h.5A1.5 1.5 0 0 1 13 2.5V15h1.5a.5.5 0 0 1 0 1h-13a.5.5 0 0 1 0-1H3V1.5a.5.5 0 0 1 .43-.495l7-1a.5.5 0 0 1 .398.117M11.5 2H11v13h1V2.5a.5.5 0 0 0-.5-.5M4 1.934V15h6V1.077z" />
                            </svg>
                            Кнопка 1
                        </label>
                    </div>
                    <div class="button-item">
                        <input type="checkbox" id="scenario2" class="button-checkbox">
                        <label for="scenario2" class="button-label">Кнопка 2</label>
                    </div>
                    <div class="button-item">
                        <input type="checkbox" id="scenario3" class="button-checkbox">
                        <label for="scenario3" class="button-label">Кнопка 3</label>
                    </div>
                </div>
            </div>

            <!-- Карточка с основными покааателями -->
            <div class="card">
                <div class="card-title">Основное</div>
                <div class="indicators">
                    <div class="indicator">
                        <div class="indicator-title">название</div>
                        <div class="indicator-value">25.7<span class="indicator-unit">C</span></div>
                    </div>
                    <div class="indicator">
                        <div class="indicator-title">название</div>
                        <div class="indicator-value">25.7<span class="indicator-unit">C</span></div>
                    </div>
                    <div class="indicator">
                        <div class="indicator-title">название</div>
                        <div class="indicator-value">25.7<span class="indicator-unit">C</span></div>
                    </div>
                    <div class="indicator">
                        <div class="indicator-title">название</div>
                        <div class="indicator-value">25.7<span class="indicator-unit">C</span></div>
                    </div>
                </div>
            </div>

            <!-- Управление прибором/оборудованием -->
            <div class="card">
                <div class="devices">
                    <div class="device">
                        <div class="device-header">
                            <div class="device-icon">icon</div>
                            <div class="device-since">since</div>
                        </div>
                        <div class="device-title">title</div>
                        <div class="device-info">info</div>
                        <div class="device-footer">
                            footer
                        </div>
                    </div>
                </div>
            </div>

            <!-- Карточка с камерой -->
            <div class="card camera">
                <div class="card-title">Управление</div>
                <div class="switch" id="deviceSwitch" role="switch" aria-checked="false" tabindex="0">
                    <span class="icon-off">✕</span>
                    <span class="icon-on">✓</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
